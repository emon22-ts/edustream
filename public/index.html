<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>EduStream+ · A Cloud Library of Knowledge</title>
<meta name='description' content='A cloud-powered academic streaming platform.'>
<link rel='icon' href='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 100 100&quot;><text y=&quot;.85em&quot; font-size=&quot;90&quot;>📖</text></svg>'>
<link rel='stylesheet' href='/css/main.css'>
<style>
.hero-band{background:var(--ink);border-bottom:1px solid rgba(255,255,255,0.05)}
.hero-inner{max-width:1280px;margin:0 auto;padding:32px 28px;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:end}
.hero-hl{font-family:var(--serif);font-size:clamp(32px,4.5vw,54px);font-weight:400;line-height:1.05;letter-spacing:-0.03em;color:var(--paper)}
.hero-hl em{font-style:italic;color:var(--amber)}
.hero-hl .dot{color:var(--burgundy)}
.hero-stats{display:flex;gap:28px;flex-shrink:0}
.stat{text-align:right;border-left:1px solid rgba(255,255,255,0.08);padding-left:28px}
.stat:first-child{border-left:none;padding-left:0}
.stat-num{font-family:var(--serif);font-size:26px;font-weight:500;color:var(--amber);line-height:1}
.stat-label{font-size:10px;color:rgba(244,236,220,0.4);margin-top:3px;letter-spacing:0.06em;text-transform:uppercase}
.home-main{max-width:1280px;margin:0 auto;padding:24px 28px 80px;display:grid;grid-template-columns:248px 1fr;gap:24px}
.home-content{min-width:0}
.sidebar{display:flex;flex-direction:column;gap:14px}
.s-card{background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.s-head{padding:11px 16px;border-bottom:1px solid var(--rule)}
.s-head-title{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;font-weight:600;color:var(--burgundy)}
.s-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--rule);cursor:pointer;transition:background 0.12s}
.s-row:last-child{border-bottom:none}
.s-row:hover{background:var(--paper-tint)}
.s-icon{width:28px;height:28px;border-radius:6px;background:var(--paper-tint);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.s-label{font-size:13px;color:var(--ink-soft);flex:1}
.s-badge{background:var(--paper-deep);border:1px solid var(--rule);border-radius:999px;padding:1px 7px;font-size:11px;font-family:var(--mono);color:var(--ink-muted)}
.feat-item{padding:11px 16px;border-bottom:1px solid var(--rule);cursor:pointer;transition:background 0.12s}
.feat-item:last-child{border-bottom:none}
.feat-item:hover{background:var(--paper-tint)}
.feat-rank{font-size:10px;font-family:var(--mono);color:var(--amber);font-weight:600;margin-bottom:3px}
.feat-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.feat-meta{font-size:11px;color:var(--ink-muted)}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--rule)}
.lb-row:last-child{border-bottom:none}
.lb-pos{width:18px;font-size:11px;font-family:var(--mono);color:var(--amber);font-weight:600;text-align:center}
.lb-av{width:24px;height:24px;border-radius:50%;background:var(--paper-tint);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--ink-soft);flex-shrink:0}
.lb-name{font-size:13px;flex:1;color:var(--ink)}
.lb-pts{font-size:11px;font-family:var(--mono);color:var(--ink-muted);margin-right:6px}
.lb-bar-wrap{width:40px;height:3px;background:var(--paper-deep);border-radius:2px;overflow:hidden}
.lb-bar{height:100%;background:var(--amber);border-radius:2px}
.streak-card{background:var(--ink);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.streak-top{display:flex;align-items:flex-end;gap:12px;margin-bottom:14px}
.streak-num{font-family:var(--serif);font-size:52px;font-weight:500;color:var(--amber);line-height:1}
.streak-title{font-size:14px;font-weight:500;color:var(--paper);margin-bottom:3px}
.streak-sub{font-size:11px;color:rgba(244,236,220,0.4);font-style:italic;font-family:var(--serif)}
.streak-days{display:flex;gap:5px;margin-bottom:10px}
.s-day{flex:1;aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.s-day.done{background:var(--amber);color:white}
.s-day.today{background:rgba(201,113,26,0.25);color:var(--amber);border:1px solid rgba(201,113,26,0.5)}
.s-day.off{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.2)}
.streak-msg{font-size:11px;color:rgba(244,236,220,0.35);font-style:italic;font-family:var(--serif)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--paper-tint);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:20px;box-shadow:var(--shadow)}
.filter-bar input[type=search]{flex:1;min-width:180px;padding:7px 11px;background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--ink)}
.filter-bar select{padding:7px 11px;background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius);font-family:var(--sans);font-size:13px}
.pill-group{display:flex;gap:4px}
.pill{padding:5px 12px;border-radius:999px;border:1px solid var(--rule);font-size:12px;cursor:pointer;background:var(--paper);color:var(--ink-muted);transition:all 0.12s;font-family:var(--sans)}
.pill.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.two-col{display:grid;grid-template-columns:360px 1fr;gap:22px;align-items:start}
.upload-panel{background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:22px;position:sticky;top:78px;box-shadow:var(--shadow)}
.up-title{font-family:var(--serif);font-size:20px;font-weight:500;margin-bottom:3px}
.up-sub{font-size:12px;font-style:italic;font-family:var(--serif);color:var(--ink-muted);margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--rule)}
.field{margin-bottom:11px}
.field label{display:block;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);margin-bottom:4px}
.field input[type=text],.field textarea,.field select{width:100%;padding:8px 11px;background:var(--paper-tint);border:1px solid var(--rule);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--ink)}
.field textarea{min-height:60px;resize:vertical}
.dropzone{border:2px dashed var(--rule);border-radius:var(--radius-lg);padding:20px;text-align:center;background:var(--paper-tint);margin-bottom:12px;cursor:pointer;transition:all 0.15s}
.dropzone:hover,.dropzone.dragging{border-color:var(--amber);background:var(--amber-pale)}
.dz-icon{font-size:24px;margin-bottom:6px}
.dz-title{font-size:13px;font-weight:500;margin-bottom:2px}
.dz-hint{font-size:11px;color:var(--ink-muted);font-style:italic;font-family:var(--serif)}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.file-row{display:flex;align-items:center;gap:8px;background:var(--paper-tint);padding:7px 10px;border-radius:var(--radius);font-size:12px;border:1px solid var(--rule)}
.media-type-pills{display:flex;gap:5px;margin-bottom:12px}
.mt-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;border:1px solid var(--rule);font-size:11.5px;color:var(--ink-muted);background:var(--paper-tint)}
.lib-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--ink)}
.lib-title{font-family:var(--serif);font-size:24px;font-weight:500}
.lib-title em{font-style:italic;color:var(--amber)}
.lib-count{font-size:12px;font-family:var(--mono);color:var(--ink-muted)}
.course{animation:fadeUp 0.35s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.c-strip{display:flex;align-items:center;gap:12px;padding:9px 20px;background:var(--paper-tint);border-bottom:1px solid var(--rule);font-size:11px}
.c-cat{font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--burgundy)}
.c-date{font-style:italic;font-family:var(--serif);color:var(--ink-muted)}
.c-body{padding:18px 22px}
.c-title{font-family:var(--serif);font-size:21px;font-weight:500;margin-bottom:4px;color:var(--ink);cursor:pointer}
.c-title:hover{color:var(--amber)}
.c-by{font-size:12px;font-style:italic;font-family:var(--serif);color:var(--ink-muted);margin-bottom:10px}
.c-by strong{font-style:normal;color:var(--ink);font-weight:600}
.c-desc{font-size:14px;line-height:1.65;color:var(--ink-soft);margin-bottom:12px}
.c-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.c-tag{border:1px solid var(--amber);color:var(--amber-deep);padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500}
.c-actions{display:flex;gap:7px;flex-wrap:wrap;padding-top:10px;border-top:1px dashed var(--rule)}
.c-comments{padding:14px 22px;background:var(--paper-tint);border-top:1px solid var(--rule)}
.c-comments-head{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;font-weight:600;color:var(--ink-muted);margin-bottom:10px}
.comment-row{border-left:2px solid var(--rule);padding:3px 0 3px 12px;margin-bottom:8px}
.comment-author{font-weight:600;font-size:12px;color:var(--ink)}
.comment-date{font-size:11px;color:var(--ink-muted);font-style:italic;margin-left:6px;font-family:var(--serif)}
.comment-text{color:var(--ink-soft);margin-top:2px;font-size:13px;line-height:1.5}
.comment-add{display:flex;gap:7px;margin-top:8px}
.comment-add input{flex:1;padding:8px 12px;background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--ink)}
.comment-add button{background:var(--amber);color:white;border:none;padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:500}
.media-viewer{background:var(--ink);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.media-tabbar{display:flex;background:rgba(255,255,255,0.05);padding:3px;gap:2px}
.m-tab{flex:1;padding:7px;text-align:center;font-size:11.5px;color:rgba(244,236,220,0.5);border-radius:4px;cursor:pointer;border:none;font-family:var(--sans);background:transparent}
.m-tab.active{background:var(--ink);color:var(--amber);font-weight:600}
.m-tab-count{font-family:var(--mono);font-size:10px;margin-left:3px;opacity:0.6}
/* AUTH MODAL */
#authModal{display:none;position:fixed;inset:0;background:rgba(14,26,43,0.88);z-index:400;align-items:center;justify-content:center}
.auth-box{background:var(--paper);padding:0;border-radius:var(--radius-lg);width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.35);overflow:hidden}
.auth-tabs{display:flex;border-bottom:1px solid var(--rule)}
.auth-tab{flex:1;padding:14px;text-align:center;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;border:none;background:var(--paper-tint);color:var(--ink-muted);transition:all 0.15s}
.auth-tab.active{background:var(--paper);color:var(--amber);border-bottom:2px solid var(--amber)}
.auth-body{padding:28px}
.auth-field{margin-bottom:13px}
.auth-field label{display:block;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);margin-bottom:4px}
.auth-field input{width:100%;padding:10px 12px;border:1px solid var(--rule);border-radius:var(--radius);font-size:14px;font-family:var(--sans);background:var(--paper-tint);color:var(--ink)}
.auth-field input:focus{outline:none;border-color:var(--amber)}
#authError{display:none;background:#f8d7da;color:#721c24;padding:9px 12px;border-radius:var(--radius);font-size:13px;margin-bottom:13px}
.auth-btn{width:100%;padding:11px;background:var(--amber);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-bottom:8px}
.auth-btn:hover{background:var(--amber-deep)}
.auth-cancel{width:100%;padding:9px;background:transparent;color:var(--ink-muted);border:1px solid var(--rule);border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:var(--sans)}
@media(max-width:900px){
  .home-main{grid-template-columns:1fr;padding:16px 16px 60px}
  .sidebar{display:none}
  .two-col{grid-template-columns:1fr}
  .hero-inner{grid-template-columns:1fr;padding:24px 16px}
  .hero-stats{display:none}
  .upload-panel{position:static}
}
</style>
</head>
<body>
<div class='loading-bar' id='loadingBar'></div>

<!-- AUTH MODAL -->
<div id='authModal'>
  <div class='auth-box'>
    <div class='auth-tabs'>
      <button class='auth-tab active' data-tab='login' onclick='switchAuthTab(login)'>Sign In</button>
      <button class='auth-tab' data-tab='register' onclick='switchAuthTab(register)'>Register</button>
    </div>
    <div class='auth-body'>
      <div id='authError'></div>
      <!-- LOGIN FORM -->
      <div id='loginForm'>
        <div class='auth-field'><label>Email</label><input type='email' id='loginEmail' placeholder='your@email.com' onkeypress='if(event.key===Enter)submitLogin()'></div>
        <div class='auth-field'><label>Password</label><input type='password' id='loginPassword' placeholder='••••••••' onkeypress='if(event.key===Enter)submitLogin()'></div>
        <button class='auth-btn' onclick='submitLogin()'>Sign In</button>
        <button class='auth-cancel' onclick='hideAuthModal()'>Cancel</button>
        <div style='text-align:center;margin-top:12px;font-size:13px;color:var(--ink-muted)'>No account? <span onclick='switchAuthTab(register)' style='color:var(--amber);cursor:pointer;font-weight:500'>Register here</span></div>
      </div>
      <!-- REGISTER FORM -->
      <div id='registerForm' style='display:none'>
        <div class='auth-field'><label>Full Name</label><input type='text' id='regName' placeholder='Your name'></div>
        <div class='auth-field'><label>Email</label><input type='email' id='regEmail' placeholder='your@email.com'></div>
        <div class='auth-field'><label>Password</label><input type='password' id='regPassword' placeholder='Min 6 characters'></div>
        <div class='auth-field'><label>Confirm Password</label><input type='password' id='regConfirm' placeholder='Repeat password' onkeypress='if(event.key===Enter)submitRegister()'></div>
        <button class='auth-btn' onclick='submitRegister()'>Create Account</button>
        <button class='auth-cancel' onclick='hideAuthModal()'>Cancel</button>
        <div style='text-align:center;margin-top:12px;font-size:13px;color:var(--ink-muted)'>Already have an account? <span onclick='switchAuthTab(login)' style='color:var(--amber);cursor:pointer;font-weight:500'>Sign in</span></div>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<div class='mobile-nav' id='mobileNav'>
  <button class='mobile-nav-close' onclick='toggleMobileNav()'>✕</button>
  <button class='mobile-nav-link' data-page='home' onclick='navigate("home");toggleMobileNav()'>🏠 Home</button>
  <button class='mobile-nav-link' data-page='explore' onclick='navigate("explore");toggleMobileNav()'>🧭 Explore</button>
  <button class='mobile-nav-link' data-page='dashboard' onclick='navigate("dashboard");toggleMobileNav()'>📊 Dashboard</button>
  <button class='mobile-nav-link' data-page='liverooms' onclick='navigate("liverooms");toggleMobileNav()'>🎙 Live Rooms</button>
</div>

<div class='rule-top'></div>
<header>
  <div class='nameplate'>
    <button class='logo' onclick='navigate("home")'>
      <div class='logo-mark'>📖</div>
      <div>
        <div class='logo-text'>EduStream<em>+</em></div>
        <div class='logo-sub'>Watch · Listen · Learn</div>
      </div>
    </button>
    <nav class='header-nav'>
      <button class='nav-link active' data-page='home' onclick='navigate("home")'>🏠 Home</button>
      <button class='nav-link' data-page='explore' onclick='navigate("explore")'>🧭 Explore</button>
      <button class='nav-link' data-page='dashboard' onclick='navigate("dashboard")'>📊 Dashboard</button>
      <button class='nav-link' data-page='liverooms' onclick='navigate("liverooms")'>🎙 Live Rooms</button>
    </nav>
    <div class='header-right'>
      <div class='user-pill' id='userPill'>
        <div class='avatar' id='userAvatar'>ME</div>
        <span class='user-name' id='userName'></span>
      </div>
      <button class='btn-ghost-hd' id='signInBtn' onclick='showLoginModal()'>Sign in</button>
      <button class='btn-ghost-hd' id='signOutBtn' onclick='signOut()' style='display:none'>Sign out</button>
      <button class='hamburger' onclick='toggleMobileNav()'>☰</button>
    </div>
  </div>
</header>

<div id='page-content'></div>
<footer><em>EduStream+ — A cloud-native academic streaming platform</em></footer>
<div id='toast'></div>
<div class='lightbox' id='lightbox' onclick='closeLightbox()'><img id='lightboxImg' alt=''></div>

<script src='/js/app.js'></script>
<script src='/pages/home.js'></script>
<script src='/pages/explore.js'></script>
<script src='/pages/course.js'></script>
<script src='/pages/dashboard.js'></script>
<script src='/pages/liverooms.js'></script>
<script>
initAuth();
var path = window.location.pathname;
var initialPage = 'home', initialParams = {};
if (path.startsWith('/explore')) initialPage = 'explore';
else if (path.startsWith('/dashboard')) initialPage = 'dashboard';
else if (path.startsWith('/liverooms')) initialPage = 'liverooms';
else if (path.startsWith('/course/')) { initialPage = 'course'; initialParams = { id: path.split('/course/')[1] }; }
navigate(initialPage, initialParams, false);
</script>
</body>
</html>
